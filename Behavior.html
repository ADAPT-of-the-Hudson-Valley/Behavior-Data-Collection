<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavior Data Collection</title>
    
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a; /* Dark background */
            color: #f0f0f0; /* Light text for contrast */
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #ffffff; /* White heading */
            margin-top: 20px;
        }

        select {
            padding: 10px;
            font-size: 16px;
            margin-top: 20px;
            background-color: #333; /* Dark background for the select box */
            color: #fff; /* Light text in the select box */
            border: 1px solid #555; /* Border color */
            border-radius: 5px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #333; /* Dark background for the container */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.1); /* Light shadow */
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 300px;
            height: auto;
            margin: 0 10px;
        }

        .submit-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #45a049;
        }
    </style>
    
    <script>
        function redirectToHouse() {
            var houseDropdown = document.getElementById("houseDropdown");
            var selectedHouseUrl = houseDropdown.value;
            if (selectedHouseUrl) {
                window.location.href = selectedHouseUrl;
            } else {
                alert("Please select a house.");
            }
        }
    </script>
</head>
